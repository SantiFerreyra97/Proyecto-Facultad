<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Farmacia Falco - Login</title>
</head>
<body>

    <div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card shadow p-4" style="width: 100%; max-width: 400px;">
    
    <h2 class="text-center mb-4" style="color: var(--color-primary);">
       <img src="/img/logo.png" height="200" class="d-block mx-auto mb-3" alt="Farmacia Falco">
    </h2>
    <h5 class="text-center text-muted mb-4">Iniciar sesión</h5>

    <form method="post" action="index.html">
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" placeholder="tucorreo@email.com" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Contraseña</label>
        <input type="password" class="form-control" id="password" placeholder="Tu contraseña" required>
      </div>
      <button type="submit" class="btn w-100 border" 
              style="background-color: lightgreen;">
        Ingresar
      </button>
    </form>

    <p class="text-center mt-3 mb-0">
      ¿No tenés cuenta? <a href="registro.html" style="color: var(--color-primary);">Registrate acá</a>
    </p>

  </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
