<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmacia Falco - Registro</title>
</head>
<body>

    <h1>Farmacia Falco</h1>
    <h2>Crear cuenta</h2>

    <form>
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" placeholder="Tu nombre" required>

        <label for="apellido">Apellido</label>
        <input type="text" id="apellido" placeholder="Tu apellido" required>

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="tucorreo@email.com" required>

        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Tu contraseña" required>

        <label for="fecha">Fecha de nacimiento</label>
        <input type="date" id="fecha" required>

        <button type="submit">Registrarse</button>
    </form>

    <p>¿Ya tenés cuenta? <a href="login.html">Iniciá sesión acá</a></p>

</body>
</html>
